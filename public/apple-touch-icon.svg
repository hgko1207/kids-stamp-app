<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <!-- 배경 그라디언트 -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fde68a"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- 배경 (둥근 사각형) -->
  <rect width="180" height="180" rx="40" ry="40" fill="url(#bg)"/>

  <!-- 별 모양 -->
  <polygon
    points="90,28 100,62 136,62 108,82 118,116 90,96 62,116 72,82 44,62 80,62"
    fill="url(#starGrad)"
    stroke="#f59e0b"
    stroke-width="2"
  />

  <!-- 도장 원 -->
  <circle cx="90" cy="130" r="26" fill="white" opacity="0.95"/>
  <circle cx="90" cy="130" r="22" fill="none" stroke="#6366f1" stroke-width="3" stroke-dasharray="4 3"/>

  <!-- 도장 체크 -->
  <polyline
    points="78,130 86,139 103,121"
    fill="none"
    stroke="#6366f1"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
